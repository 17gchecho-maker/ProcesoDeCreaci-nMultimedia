<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Proceso de Creacion de Multimedia</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link href="index.css"
        rel="stylesheet">

</head>

<body>

    <div class="container-fluid p-0">

        <!-- HEADER -->
        <div class="row g-0">

            <header class="col-12 p-4 text-white text-center shadow-sm z-3 position-relative">

                <h1 class="fs-2 m-0 fw-bold">
                    Proceso de Creacion de Multimedia
                </h1>

            </header>

        </div>

        <div class="row g-0">

            <!-- MENU IZQUIERDO -->
            <nav class="col-12 col-md-3 col-lg-2 p-4 pt-5 shadow-sm z-2">

                <div class="sticky-md-top"
                    style="top: 2rem;">

                    <ul class="list-unstyled d-flex flex-row flex-md-column flex-wrap gap-2 justify-content-center m-0">

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#investigacion">

                                Investigación

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#brief">

                                Brief

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#concepto_grafico">

                                Concepto gráfico

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#Idea">

                                Idea

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#Sketch">

                                Sketch

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#Wireframe">

                                Wireframe

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#Mockup">

                                Mockup

                            </a>
                        </li>

                        <li class="flex-grow-1">
                            <a class="btn btn-light w-100 fw-semibold text-center"
                                href="#Prototipo">

                                Prototipo

                            </a>
                        </li>

                    </ul>

                </div>

            </nav>

            <!-- CONTENIDO -->
            <section class="col-12 col-md-9 col-lg-7 p-4 p-lg-5 z-1">

                <div class="d-flex flex-column gap-5">

                    <!-- INVESTIGACION -->
                    <div class="pdf-viewer shadow-sm border rounded w-100"
                        id="investigacion">

                        <object data="10paginasweb.pdf"
                            type="application/pdf">

                            <p class="text-white p-3">

                                Tu navegador no puede mostrar este PDF.

                            </p>

                        </object>

                    </div>

                    <!-- BRIEF -->
                    <div class="pdf-viewer shadow-sm border rounded w-100"
                        id="brief">

                        <object data="brief%20personal%20CHECHO.pdf"
                            type="application/pdf">

                            <p class="text-white p-3">

                                Tu navegador no puede mostrar este PDF.

                            </p>

                        </object>

                    </div>

                    <!-- VIDEO -->
                    <div id="concepto_grafico">

                        <video class="shadow-sm border rounded w-100"
                            controls>

                            <source src="Video Portafolio.mp4"
                                type="video/mp4">

                        </video>

                    </div>

                    <!-- AUDIO -->
                    <div id="Idea"
                        class="audio-container shadow-sm border rounded w-100 p-4">

                        <audio controls class="w-100">

                            <source src="Explicación proceso.mp3"
                                type="audio/mpeg">

                        </audio>

                    </div>

                    <!-- SKETCH -->
                    <div class="pdf-viewer shadow-sm border rounded w-100"
                        id="Sketch">

                        <object data="Sketch.pdf"
                            type="application/pdf">

                        </object>

                    </div>

                    <!-- WIREFRAME -->
                    <div class="pdf-viewer shadow-sm border rounded w-100"
                        id="Wireframe">

                        <object data="Mockup.pdf"
                            type="application/pdf">

                        </object>

                    </div>

                    <!-- MOCKUP -->
                    <div class="pdf-viewer shadow-sm border rounded w-100"
                        id="Mockup">

                        <object data="Portafolio.pdf"
                            type="application/pdf">

                        </object>

                    </div>

                    <!-- PROTOTIPO -->
                    <div id="Prototipo"
                        class="prototype-container shadow-sm border rounded overflow-hidden">

                        <img src="paginaweb.png"
                            alt="Prototipo"
                            class="prototype-image">

                    </div>

                </div>

            </section>

            <!-- LATERAL DERECHO -->
            <aside class="col-12 col-lg-3 p-4 pt-5 text-white shadow-sm z-0">

                <div class="sticky-lg-top"
                    style="top: 2rem;">

                    <ul class="list-unstyled d-flex flex-row flex-lg-column flex-wrap gap-3 justify-content-center m-0">

                        <li class="flex-grow-1">

                            <h3 class="fs-6 m-0 text-center text-lg-start bg-dark bg-opacity-25 p-2 rounded">
                                Exploración Visual
                            </h3>

                        </li>

                        <li class="flex-grow-1">

                            <h3 class="fs-6 m-0 text-center text-lg-start bg-dark bg-opacity-25 p-2 rounded">
                                Recolección de información
                            </h3>

                        </li>

                        <li class="flex-grow-1">

                            <h3 class="fs-6 m-0 text-center text-lg-start bg-dark bg-opacity-25 p-2 rounded">
                                Producto final
                            </h3>

                        </li>

                    </ul>

                </div>

            </aside>

        </div>

    </div>

    <!-- ========================= -->
    <!-- BOTON + QR -->
    <!-- ========================= -->

    <div class="floating-container">

        <!-- BOTON -->
        <a href="https://17gchecho-maker.github.io/PaginaWebPortafolio/"
            target="_blank"
            class="pagina-btn">

            IR A LA WEB

        </a>

        <!-- QR -->
        <img src="qrcode_17gchecho-maker.github.io.png"
            alt="QR Pagina Web"
            class="qr-image"
            id="qrImage">

    </div>

    <!-- ========================= -->
    <!-- MODAL QR -->
    <!-- ========================= -->

    <div class="qr-modal"
        id="qrModal">

        <span class="close-qr"
            id="closeQr">

            ✕

        </span>

        <img src="qrcode_17gchecho-maker.github.io.png"
            alt="QR Grande"
            class="qr-big-image">

    </div>

    <!-- ========================= -->
    <!-- SCRIPT QR -->
    <!-- ========================= -->

    <script>

        const qrImage = document.getElementById("qrImage");
        const qrModal = document.getElementById("qrModal");
        const closeQr = document.getElementById("closeQr");

        qrImage.addEventListener("click", () => {

            qrModal.classList.add("active");

        });

        closeQr.addEventListener("click", () => {

            qrModal.classList.remove("active");

        });

        qrModal.addEventListener("click", (e) => {

            if (e.target === qrModal) {

                qrModal.classList.remove("active");

            }

        });

    </script>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">

    </script>

</body>

</html>
